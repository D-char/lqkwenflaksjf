<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>骑行路线点亮 - 真实地图原型</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #FF6B35;
      --secondary: #4ECDC4;
      --accent: #95E616;
      --highlight: #FFD93D;
      --bg: #1A1A2E;
      --bg-card: #252542;
      --text: #FFFFFF;
      --text-secondary: #B0B0B0;
      --success: #2ECC71;
      --error: #E74C3C;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a15;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .prototype-label {
      position: fixed;
      top: 10px;
      right: 10px;
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      z-index: 1000;
    }
    
    .phone-frame {
      width: 375px;
      height: 812px;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: var(--bg);
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }
    
    .screen {
      height: 100%;
      display: none;
      flex-direction: column;
      padding-top: 50px;
    }
    
    .screen.active { display: flex; }
    
    .main-screen {
      background: var(--bg);
    }
    
    .header {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 500;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    }
    
    .header-title {
      font-size: 20px;
      font-weight: bold;
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      background: rgba(37, 37, 66, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(10px);
    }
    
    .map-container {
      flex: 1;
      position: relative;
    }
    
    #map {
      width: 100%;
      height: 100%;
    }
    
    .leaflet-container {
      background: #1a3a4a;
    }
    
    .achievement-card {
      position: absolute;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: rgba(37, 37, 66, 0.95);
      border-radius: 20px;
      padding: 20px;
      z-index: 500;
      backdrop-filter: blur(10px);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .card-badge {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .stats-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--highlight);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--highlight));
      border-radius: 4px;
      width: 68%;
    }
    
    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .btn-share {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #ff8c5a);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 16px;
      cursor: pointer;
    }
    
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: rgba(37, 37, 66, 0.95);
      padding: 10px 0;
      z-index: 500;
      backdrop-filter: blur(10px);
    }
    
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 10px;
    }
    
    .tab-item.active {
      color: var(--primary);
    }
    
    .map-legend {
      position: absolute;
      top: 120px;
      right: 16px;
      background: rgba(37, 37, 66, 0.9);
      border-radius: 12px;
      padding: 12px;
      z-index: 500;
      font-size: 12px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .legend-dot.lit {
      background: var(--highlight);
      box-shadow: 0 0 8px var(--highlight);
    }
    
    .legend-dot.unlit {
      background: transparent;
      border: 2px dashed var(--text-secondary);
    }
    
    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .nav-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg-card);
      border: none;
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }
    
    .nav-btn.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="prototype-label">交互原型</div>
  
  <h2 style="font-size: 24px; font-weight: bold; margin: 20px 0 10px; color: var(--primary);">骑行路线点亮 - 真实地图版</h2>
  <p style="max-width: 600px; margin: 10px auto; text-align: center; color: var(--text-secondary);">
    使用Leaflet展示真实地图 · 点击路线查看详情<br>
    黄色 = 已点亮路线 · 灰色虚线 = 未点亮路线
  </p>
  
  <div class="phone-frame">
    <div class="notch"></div>
    
    <!-- Main Screen with Real Map -->
    <div id="screen-main" class="screen main-screen active">
      <div class="header">
        <span class="header-title">我的点亮</span>
        <div class="header-btn">⚙️</div>
      </div>
      
      <div class="map-container">
        <div id="map"></div>
        
        <div class="map-legend">
          <div class="legend-item">
            <div class="legend-dot lit"></div>
            <span>已点亮路线</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot unlit"></div>
            <span>未点亮路线</span>
          </div>
        </div>
        
        <div class="achievement-card">
          <div class="card-header">
            <span class="card-title">点亮成就</span>
            <span class="card-badge">本周+2</span>
          </div>
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value">68%</div>
              <div class="stat-label">点亮率</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">45</div>
              <div class="stat-label">已点亮</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">66</div>
              <div class="stat-label">总路线</div>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <div class="progress-text">
            <span>北京地区</span>
            <span>Top 15%</span>
          </div>
          <button class="btn-share">📤 炫耀一下</button>
        </div>
      </div>
      
      <div class="tab-bar">
        <div class="tab-item active">
          <span>🗺️</span>
          <span>地图</span>
        </div>
        <div class="tab-item">
          <span>📍</span>
          <span>路线</span>
        </div>
        <div class="tab-item">
          <span>🏆</span>
          <span>成就</span>
        </div>
        <div class="tab-item">
          <span>👤</span>
          <span>我的</span>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 北京热门骑行路线数据
    const routes = {
      // 已点亮路线 - 戒台寺到潭王路
      lit1: {
        coords: [
          [39.875, 116.085],
          [39.880, 116.090],
          [39.885, 116.095],
          [39.890, 116.100],
          [39.895, 116.105],
          [39.900, 116.110]
        ],
        lit: true
      },
      // 已点亮路线 - 妙峰山
      lit2: {
        coords: [
          [39.970, 116.020],
          [39.975, 116.025],
          [39.980, 116.030],
          [39.985, 116.035],
          [39.990, 116.040]
        ],
        lit: true
      },
      // 未点亮路线 - 十三陵水库
      unlit1: {
        coords: [
          [40.250, 116.220],
          [40.255, 116.230],
          [40.260, 116.240],
          [40.265, 116.250]
        ],
        lit: false
      },
      // 未点亮路线 - 白虎涧
      unlit2: {
        coords: [
          [40.080, 116.100],
          [40.085, 116.110],
          [40.090, 116.120]
        ],
        lit: false
      }
    };
    
    // 初始化地图
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false
    }).setView([39.920, 116.100], 11);
    
    // 使用深色地图底图
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18
    }).addTo(map);
    
    // 绘制已点亮路线（金黄色+发光效果）
    Object.values(routes).forEach(route => {
      if (route.lit) {
        // 发光底层
        L.polyline(route.coords, {
          color: '#FFD93D',
          weight: 12,
          opacity: 0.3
        }).addTo(map);
        
        // 主路线
        L.polyline(route.coords, {
          color: '#FFD93D',
          weight: 5,
          opacity: 0.9
        }).addTo(map);
        
        // 起点标记
        L.circleMarker(route.coords[0], {
          radius: 8,
          fillColor: '#FFD93D',
          fillOpacity: 1,
          color: '#fff',
          weight: 2
        }).addTo(map);
        
        // 终点标记
        L.circleMarker(route.coords[route.coords.length - 1], {
          radius: 6,
          fillColor: '#FF6B35',
          fillOpacity: 1,
          color: '#fff',
          weight: 2
        }).addTo(map);
      } else {
        // 未点亮路线（灰色虚线）
        L.polyline(route.coords, {
          color: '#666',
          weight: 4,
          opacity: 0.6,
          dashArray: '10, 10'
        }).addTo(map);
      }
    });
  </script>
</body>
</html>
