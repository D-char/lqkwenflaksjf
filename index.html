<!DOCTYPE html> 
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>骑行路线点亮 - 真实地图原型</title>
  
  <!-- 项目样式 -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 高德地图 JS API 异步加载 -->
  <script>
    window.initAMap = function() {
      console.log('✅ 高德地图SDK加载完成');
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=1.4.15&key=ab2d12c583618aa0959c3dcbd7709f1d&callback=initAMap" async></script>
  <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js" async></script>
</head>
<body>
  <div class="phone-frame">
    <div class="notch"></div>
    
    <!-- Login Screen -->
    <div id="screen-login" class="screen login-screen active">
      <div class="login-container">
        <div class="login-logo"></div>
        <div class="login-title">顽鹿骑行路线点亮</div>
        <div class="login-subtitle">连接顽鹿账号，同步你的骑行数据<br>点亮你征服过的每一条路线</div>
        
        <button class="login-btn" onclick="redirectToLogin()">
          🚴 顽鹿账号登录
        </button>
        
        <div class="login-features">
          <div class="feature-item">
            <div class="feature-icon"></div>
            <div class="feature-text">
              <div class="feature-title">同步骑行记录</div>
              <div class="feature-desc">自动同步你在顽鹿平台的所有骑行数据</div>
            </div>
          </div>
          <div class="feature-item">
            <div class="feature-icon"></div>
            <div class="feature-text">
              <div class="feature-title">路线点亮</div>
              <div class="feature-desc">征服的路线会自动点亮，展示你的骑行足迹</div>
            </div>
          </div>
        </div>
        
        <div class="login-footer">
          登录即表示同意《用户协议》和《隐私政策》
        </div>
      </div>
    </div>
    
    <!-- Main Screen with Real Map -->
    <div id="screen-main" class="screen main-screen">
      <div class="user-info-card" id="user-info-card">
        <div class="user-avatar" id="user-avatar">骑</div>
        <div class="user-details">
          <div class="user-name" id="user-name">加载中...</div>
          <div class="user-status">已连接顽鹿</div>
        </div>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>
      
      <div class="header">
        <div class="city-selector-inline" id="city-selector" style="display: none;">
          <div class="city-dropdown" onclick="toggleCityDropdown()">
            <span id="current-city">请选择区域</span>
            <span class="city-dropdown-arrow">▼</span>
          </div>
          <div class="city-list" id="city-list"></div>
        </div>
        <div class="map-legend">
          <div class="legend-item">
            <div class="legend-line lit"></div>
            <span>已点亮路线</span>
          </div>
        </div>
      </div>
      
      <div class="header-actions">
        <div class="header-btn upload-btn" onclick="triggerUpload()">📤</div>
        <div class="header-btn style-btn" onclick="toggleStylePanel()">🗺️</div>
      </div>
      
      <div id="style-panel" class="style-panel" style="display: none;">
        <div class="style-panel-title">地图样式</div>
        <div class="style-options">
          <div class="style-option active" data-style="normal" onclick="switchMapStyle('normal')">标准</div>
          <div class="style-option" data-style="whitesmoke" onclick="switchMapStyle('whitesmoke')">远山</div>
        </div>
      </div>
      
      <input type="file" id="fit-file-input" accept=".fit" style="display: none;" onchange="handleFileUpload(event)">
      
      <div id="upload-overlay" class="upload-overlay" style="display: none;">
        <div class="upload-content">
          <div class="upload-icon">📁</div>
          <div class="upload-text">拖拽FIT文件到这里</div>
          <div class="upload-subtext">或点击上方按钮选择文件</div>
          <button class="upload-cancel-btn" onclick="hideUploadOverlay()">取消</button>
        </div>
      </div>
      
      <div id="upload-progress" class="upload-progress" style="display: none;">
        <div class="progress-content">
          <div class="progress-spinner"></div>
          <div class="progress-text" id="progress-text">正在解析...</div>
        </div>
      </div>
      
      <div class="map-container">
        <div id="map">
          <div id="map-loading" class="map-loading">
            <img id="static-map" class="static-map" src="https://restapi.amap.com/v3/staticmap?key=ab2d12c583618aa0959c3dcbd7709f1d&location=116.4074,39.9042&zoom=11&size=375*600&traffic=0" alt="地图加载中">
            <div class="map-loading-overlay">
              <div class="map-loading-spinner"></div>
              <div class="map-loading-text">加载中...</div>
            </div>
          </div>
        </div>
        
        <div class="achievement-card">
          <div class="card-header">
            <span class="card-title">点亮成就</span>
            <span class="card-badge">本周+0</span>
          </div>
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-value">--%</div>
              <div class="stat-label">点亮率</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">--km</div>
              <div class="stat-label">已点亮</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">--km</div>
              <div class="stat-label">总路线</div>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <div class="progress-text">
            <span id="region-name">未定位</span>
            <span>上传FIT文件点亮路线</span>
          </div>
          <button class="btn-share" onclick="enterShowcaseMode(event)">📤 炫耀一下</button>
        </div>
      </div>
      
    </div>
  </div>
  
  <!-- 项目脚本 -->
  <script src="js/app.js"></script>
  <script src="js/road-data-api.js"></script>
  <script src="js/track-storage.js"></script>
  
  <script type="module">
    import FitParser from 'https://cdn.jsdelivr.net/npm/fit-file-parser@2.3.3/+esm';
    window.FitParser = FitParser;
    
    window.fitParserReady = true;
    console.log('✅ FitParser模块加载成功');
  </script>
  
  <script src="js/fit-parser.js"></script>
  <script src="js/stats-calculator.js"></script>
  <script src="js/upload-handler.js"></script>
  <script src="js/share-handler.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
