worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name localhost;
        
        # 前端静态文件
        location / {
            root .;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
        
        # 代理 API 请求到 OneLap 后端
        location /api/v1/activities {
            proxy_pass http://rfs-web.rfsvr.net;
            proxy_set_header Host rfs-web.rfsvr.net;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/v1/user/info {
            proxy_pass http://rfs-web.rfsvr.net;
            proxy_set_header Host rfs-web.rfsvr.net;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
