worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       D:/onelapMap/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 临时文件路径（需手动创建 D:/onelapMap/temp/ 目录）
    client_body_temp_path   D:/onelapMap/temp/client_body;
    proxy_temp_path         D:/onelapMap/temp/proxy;
    fastcgi_temp_path       D:/onelapMap/temp/fastcgi;
    uwsgi_temp_path         D:/onelapMap/temp/uwsgi;
    scgi_temp_path          D:/onelapMap/temp/scgi;

    server {
        listen 8080;
        server_name localhost;

        # 前端静态文件
        root D:/onelapMap;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # 代理 API 请求到 OneLap 后端
        # ⚠️ 注意: rfs-web.rfsvr.net 无法解析（DNS lookup failed）
        # 请确认 OneLap API 的实际域名并替换下方 proxy_pass 地址
        # 可能的地址: https://www.onelap.cn 或 https://api.onelap.cn
        location /api/v1/activities {
            proxy_pass http://rfs-web.rfsvr.net;
            proxy_set_header Host rfs-web.rfsvr.net;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout   10s;
            proxy_read_timeout      30s;
        }

        location /api/v1/user/info {
            proxy_pass http://rfs-web.rfsvr.net;
            proxy_set_header Host rfs-web.rfsvr.net;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout   10s;
            proxy_read_timeout      30s;
        }
    }
}
